name: Protect Main Branch

on:
  push:
    branches:
      - main

jobs:
  check-authorized-user:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          token: ${{ secrets.PROTECTION_TOKEN }}

      - name: Check if pusher is authorized
        id: check
        run: |
          PUSHER="${{ github.actor }}"
          echo "Push attempted by: $PUSHER"
          if [ "$PUSHER" = "shashank" ] || [ "$PUSHER" = "abhinavdhaam" ]; then
            echo "Authorized user: $PUSHER - push allowed."
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "Unauthorized user: $PUSHER - reverting push!"
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: Revert unauthorized push
        if: steps.check.outputs.authorized == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push origin main